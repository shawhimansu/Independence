body {
  font-family: 'Lato', sans-serif;
  background: #fdf6ec;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 16px;
  color: #1a1209;
}

#quiz-root {
  width: 100%;
  max-width: 640px;
}

.banner {
  background: linear-gradient(135deg, #c8800a 0%, #a05c00 50%, #7a4200 100%);
  padding: 24px 28px 20px;
  border-radius: 16px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  gap: 18px;
}
.banner::before {
  content: '';
  position: absolute; top: -20px; right: -20px;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
}
.banner::after {
  content: '';
  position: absolute; bottom: -30px; right: 60px;
  width: 80px; height: 80px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
}
.banner-icon {
  font-size: 52px;
  line-height: 1;
  flex-shrink: 0;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
}
.banner-text h1 {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 700;
  color: #fff8ee;
  line-height: 1.2;
  margin-bottom: 5px;
}
.banner-text p {
  font-size: 14px;
  color: #f5d995;
  font-weight: 300;
  letter-spacing: 0.5px;
}

.progress-bar-wrap {
  background: #e8d9c0;
  border-radius: 20px;
  height: 7px;
  margin-bottom: 7px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #c8800a, #f5a623);
  border-radius: 20px;
  transition: width 0.5s ease;
}
.progress-label {
  font-size: 12px;
  color: #7a6040;
  margin-bottom: 18px;
  letter-spacing: 0.3px;
}

.question-card {
  background: #fff;
  border: 1px solid #e8d9c0;
  border-radius: 16px;
  padding: 22px 24px;
  margin-bottom: 16px;
  box-shadow: 0 2px 12px rgba(120, 80, 0, 0.07);
}
.q-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.q-badge {
  background: #fff0d0;
  color: #7a4200;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid #f5c875;
}
.q-icon { font-size: 22px; }
.q-text {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 400;
  line-height: 1.6;
  color: #1a1209;
  margin-bottom: 20px;
}

.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
@media (max-width: 480px) {
  .options-grid { grid-template-columns: 1fr; }
}

.opt-btn {
  background: #fdf6ec;
  border: 1.5px solid #d4b882;
  border-radius: 10px;
  padding: 13px 14px;
  text-align: left;
  cursor: pointer;
  font-family: 'Lato', sans-serif;
  font-size: 14px;
  color: #1a1209;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  transition: all 0.18s ease;
  line-height: 1.4;
}
.opt-btn:hover:not(:disabled) {
  border-color: #c8800a;
  background: #fff8ee;
  transform: translateY(-1px);
  box-shadow: 0 3px 10px rgba(120, 80, 0, 0.1);
}
.opt-label {
  min-width: 24px; height: 24px;
  border-radius: 50%;
  background: #e8d4b0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #7a4200;
  flex-shrink: 0;
}
.opt-btn.correct {
  background: #eaf6e8;
  border-color: #3B6D11;
}
.opt-btn.correct .opt-label {
  background: #3B6D11;
  color: #fff;
}
.opt-btn.wrong {
  background: #faeaea;
  border-color: #A32D2D;
}
.opt-btn.wrong .opt-label {
  background: #A32D2D;
  color: #fff;
}
.opt-btn:disabled { cursor: default; transform: none; box-shadow: none; }

.feedback-box {
  border-radius: 10px;
  padding: 13px 16px;
  font-size: 14px;
  line-height: 1.6;
  margin-top: 16px;
  display: none;
}
.feedback-box.show { display: block; }
.feedback-box.correct-fb {
  background: #eaf6e8;
  color: #2a5010;
  border-left: 3px solid #3B6D11;
}
.feedback-box.wrong-fb {
  background: #faeaea;
  color: #6b1f1f;
  border-left: 3px solid #A32D2D;
}
.feedback-box strong { font-weight: 700; }

.next-btn {
  margin-top: 20px;
  background: linear-gradient(135deg, #c8800a, #a05c00);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 13px 30px;
  font-family: 'Lato', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  display: none;
  letter-spacing: 0.3px;
  transition: opacity 0.2s, transform 0.15s;
  box-shadow: 0 3px 10px rgba(120, 80, 0, 0.25);
}
.next-btn:hover { opacity: 0.88; transform: translateY(-1px); }
.next-btn.show { display: inline-block; }

/* Score screen */
.score-screen {
  text-align: center;
  padding: 36px 24px;
  background: #fff;
  border: 1px solid #e8d9c0;
  border-radius: 16px;
  box-shadow: 0 2px 12px rgba(120, 80, 0, 0.07);
  display: none;
}
.score-screen.show { display: block; }
.score-trophy { font-size: 56px; margin-bottom: 8px; }
.score-big {
  font-family: 'Playfair Display', serif;
  font-size: 68px;
  font-weight: 700;
  color: #c8800a;
  line-height: 1;
  margin: 8px 0 4px;
}
.score-label {
  font-size: 15px;
  color: #7a6040;
  margin-bottom: 20px;
}
.score-msg {
  font-family: 'Playfair Display', serif;
  font-size: 21px;
  color: #1a1209;
  margin-bottom: 14px;
}
.score-divider {
  width: 60px; height: 2px;
  background: linear-gradient(90deg, #c8800a, #f5a623);
  margin: 0 auto 16px;
  border-radius: 2px;
}
.score-quote {
  font-style: italic;
  font-size: 14px;
  color: #7a6040;
  max-width: 360px;
  margin: 0 auto 28px;
  line-height: 1.8;
}
.restart-btn {
  background: linear-gradient(135deg, #c8800a, #a05c00);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 14px 36px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.3px;
  font-family: 'Lato', sans-serif;
  transition: opacity 0.2s, transform 0.15s;
  box-shadow: 0 3px 10px rgba(120, 80, 0, 0.25);
}
.restart-btn:hover { opacity: 0.88; transform: translateY(-1px); }

.footer-note {
  text-align: center;
  font-size: 12px;
  color: #a08060;
  margin-top: 20px;
  letter-spacing: 0.3px;
}

      fb: 'Gandhi sailed to London in September 1888 at age 18 to study law at the Inner Temple. During his time there he also explored vegetarianism, theosophy, and the works of Tolstoy.'
    },
    {
      icon: '🚂',
      cat: 'South Africa',
      text: 'A pivotal moment in Gandhi\'s life occurred in South Africa in 1893. What happened that sparked his lifelong activism?',
      opts: [
        'He was denied a legal license',
        'He was forcibly thrown off a train at Pietermaritzburg for sitting in the first-class carriage',
        'His home was burned down',
        'He was arrested for practicing law'
      ],
      ans: 1,
      fb: 'Despite holding a valid first-class ticket, Gandhi was thrown off the train at Pietermaritzburg station because of his race. He spent the cold night at the station contemplating whether to return to India or fight racial injustice. He chose to fight — and history was made.'
    }
  ];

  let current = 0, score = 0, answered = false;

  function renderQuestion() {
    answered = false;
    const q = questions[current];
    const total = questions.length;
    document.getElementById('progress-fill').style.width = (current / total * 100) + '%';
    document.getElementById('progress-label').textContent = 'Question ' + (current + 1) + ' of ' + total;
    document.getElementById('q-cat').textContent = q.cat;
    document.getElementById('q-icon').textContent = q.icon;
    document.getElementById('q-text').textContent = q.text;
    const grid = document.getElementById('options-grid');
    grid.innerHTML = '';
    const labels = ['A', 'B', 'C', 'D'];
    q.opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.innerHTML = '<span class="opt-label">' + labels[i] + '</span><span>' + opt + '</span>';
      btn.onclick = () => selectAnswer(i);
      grid.appendChild(btn);
    });
    const fb = document.getElementById('feedback-box');
    fb.className = 'feedback-box';
    fb.textContent = '';
    document.getElementById('next-btn').className = 'next-btn';
  }

  function selectAnswer(idx) {
    if (answered) return;
    answered = true;
    const q = questions[current];
    const btns = document.querySelectorAll('.opt-btn');
    btns.forEach(b => b.disabled = true);
    const correct = idx === q.ans;
    if (correct) score++;
    btns[idx].classList.add(correct ? 'correct' : 'wrong');
    if (!correct) btns[q.ans].classList.add('correct');
    const fb = document.getElementById('feedback-box');
    fb.className = 'feedback-box show ' + (correct ? 'correct-fb' : 'wrong-fb');
    fb.innerHTML = (correct ? '<strong>Correct!</strong> ' : '<strong>Not quite.</strong> ') + q.fb;
    document.getElementById('next-btn').className = 'next-btn show';
  }

  document.getElementById('next-btn').onclick = function () {
    current++;
    if (current < questions.length) {
      renderQuestion();
    } else {
      showScore();
    }
  };

  function showScore() {
    document.getElementById('quiz-body').style.display = 'none';
    const ss = document.getElementById('score-screen');
    ss.className = 'score-screen show';
    document.getElementById('score-num').textContent = score + '/' + questions.length;
    document.getElementById('score-label').textContent = 'questions answered correctly';
    const msgs = [
      ['Time to revisit the history books!', '📚'],
      ['A good start on Gandhi\'s journey!', '🌱'],
      ['Well done, young scholar!', '✨'],
      ['Impressive knowledge of Bapu\'s life!', '🎯'],
      ['You truly know the Mahatma\'s early years!', '🏆']
    ];
    const tier = score === 5 ? 4 : score >= 4 ? 3 : score >= 3 ? 2 : score >= 2 ? 1 : 0;
    document.getElementById('score-msg').textContent = msgs[tier][1] + ' ' + msgs[tier][0];
  }

  function restartQuiz() {
    current = 0; score = 0;
    document.getElementById('quiz-body').style.display = 'block';
    document.getElementById('score-screen').className = 'score-screen';
    renderQuestion();
  }

  renderQuestion();
</script>

</body>
</html>
